name: Auto Update Blog

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install tushare pandas requests tabulate
      
      - name: Run fetch scripts
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          cd scripts && pwd && ls -la
          python fetch_stocks.py || echo "stocks skipped"
          python fetch_industry.py || echo "industry skipped"
          python fetch_shipping.py || echo "shipping skipped"
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Hexo
        run: |
          npm install -g hexo-cli
          npm install
          npm install hexo-theme-butterfly
          npm install hexo-deployer-git
      
      - name: Generate site
        run: |
          hexo generate || echo "generate skipped"
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./public
