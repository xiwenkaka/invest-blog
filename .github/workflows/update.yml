name: Auto Update Blog

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install tushare pandas requests tabulate
      
      - name: Run fetch scripts
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          cd scripts
          python fetch_stocks.py || echo "stocks done"
          python fetch_industry.py || echo "industry done"
          python fetch_shipping.py || echo "shipping done"
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Hexo and generate
        run: |
          cd ${{ github.workspace }}
          npm install
          ./node_modules/.bin/hexo generate
          ls -la public/
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACCESS_TOKEN }}
          publish_dir: ./public
